# EstateFlow: Postgres + API (Express + Vite landing).
#
# Usage:
#   docker compose up --build
#   API + landing: http://localhost:5000
#
# For the mobile app as web UI (pointing at this API or any other URL), use:
#   docker compose -f docker-compose.mobile-web.yml up --build
#
# Set JWT_SECRET / SESSION_SECRET in a .env file next to this compose file for real use.

services:
  postgres:
    image: postgres:16-alpine
    container_name: estateflow-postgres
    environment:
      POSTGRES_USER: estateflow
      POSTGRES_PASSWORD: estateflow
      POSTGRES_DB: estateflow
    ports:
      - "5432:5432"
    volumes:
      - estateflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U estateflow -d estateflow"]
      interval: 3s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    container_name: estateflow-migrate
    environment:
      DATABASE_URL: postgresql://estateflow:estateflow@postgres:5432/estateflow
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: estateflow-backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://estateflow:estateflow@postgres:5432/estateflow
      NODE_ENV: production
      PORT: "5000"
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-change-me}
      SESSION_SECRET: ${SESSION_SECRET:-dev-session-change-me}
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  estateflow_pgdata:
