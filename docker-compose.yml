# EstateFlow: Postgres + API (Express + Vite landing) + Mobile app as static web (Expo export).
#
# Usage:
#   docker compose up --build
#   API + landing:  http://localhost:5000
#   Mobile (web UI): http://localhost:8080  (calls API at EXPO_PUBLIC_API_URL, default host localhost:5000)
#
# Set JWT_SECRET / SESSION_SECRET in a .env file next to this compose file for real use.

services:
  postgres:
    image: postgres:16-alpine
    container_name: estateflow-postgres
    environment:
      POSTGRES_USER: estateflow
      POSTGRES_PASSWORD: estateflow
      POSTGRES_DB: estateflow
    ports:
      - "5432:5432"
    volumes:
      - estateflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U estateflow -d estateflow"]
      interval: 3s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    container_name: estateflow-migrate
    environment:
      DATABASE_URL: postgresql://estateflow:estateflow@postgres:5432/estateflow
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: estateflow-backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://estateflow:estateflow@postgres:5432/estateflow
      NODE_ENV: production
      PORT: "5000"
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-change-me}
      SESSION_SECRET: ${SESSION_SECRET:-dev-session-change-me}
    depends_on:
      migrate:
        condition: service_completed_successfully

  mobile-web:
    build:
      context: ./mobile
      dockerfile: Dockerfile
      args:
        # Browser on your machine must reach the API; host port is 5000.
        EXPO_PUBLIC_API_URL: ${EXPO_PUBLIC_API_URL:-http://localhost:5000}
    container_name: estateflow-mobile-web
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  estateflow_pgdata:
